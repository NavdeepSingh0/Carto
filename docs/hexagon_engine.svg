<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E23744;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E23744;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="780" rx="16" fill="#0f0f1a"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" letter-spacing="1">THE HEXAGON CANDIDATE ENGINE</text>
  <text x="450" y="65" text-anchor="middle" fill="#888" font-size="13" letter-spacing="2">STAGE 1 · CANDIDATE GENERATION</text>

  <!-- Hexagon shape (connecting lines) -->
  <polygon points="450,115  720,270  720,500  450,655  180,500  180,270" 
           fill="url(#centerGrad)" stroke="url(#hexGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Connecting lines from center to vertices -->
  <line x1="450" y1="385" x2="450" y2="115" stroke="#E23744" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="450" y1="385" x2="720" y2="270" stroke="#E23744" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="450" y1="385" x2="720" y2="500" stroke="#E23744" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="450" y1="385" x2="450" y2="655" stroke="#E23744" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="450" y1="385" x2="180" y2="500" stroke="#E23744" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="450" y1="385" x2="180" y2="270" stroke="#E23744" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Center node -->
  <circle cx="450" cy="385" r="52" fill="#1a1a2e" stroke="#E23744" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="378" text-anchor="middle" fill="#E23744" font-size="20" font-weight="700">🛒</text>
  <text x="450" y="400" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">CART ITEM</text>

  <!-- ═══ NODE 1 — Top ═══ -->
  <rect x="340" y="80" width="220" height="60" rx="12" fill="#1e1e30" stroke="#E23744" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="365" y="108" fill="#E23744" font-size="18">🍴</text>
  <text x="390" y="104" fill="#fff" font-size="13" font-weight="700">Node 1</text>
  <text x="390" y="124" fill="#ccc" font-size="11">Core Extension</text>
  <text x="525" y="124" fill="#4ade80" font-size="10" font-weight="600">76.5%</text>

  <!-- ═══ NODE 2 — Top Right ═══ -->
  <rect x="710" y="215" width="180" height="60" rx="12" fill="#1e1e30" stroke="#FF6B6B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="243" fill="#FF6B6B" font-size="18">🌊</text>
  <text x="755" y="239" fill="#fff" font-size="13" font-weight="700">Node 2</text>
  <text x="755" y="259" fill="#ccc" font-size="11">Texture Contrast</text>
  <text x="860" y="259" fill="#4ade80" font-size="10" font-weight="600">52.3%</text>

  <!-- ═══ NODE 3 — Bottom Right ═══ -->
  <rect x="710" y="470" width="180" height="60" rx="12" fill="#1e1e30" stroke="#FF6B6B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="498" fill="#FF6B6B" font-size="18">📊</text>
  <text x="755" y="494" fill="#fff" font-size="13" font-weight="700">Node 3</text>
  <text x="755" y="514" fill="#ccc" font-size="11">Co-Occurrence CF</text>
  <text x="860" y="514" fill="#4ade80" font-size="10" font-weight="600">58.7%</text>

  <!-- ═══ NODE 4 — Bottom ═══ -->
  <rect x="335" y="635" width="230" height="60" rx="12" fill="#1e1e30" stroke="#E23744" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="358" y="663" fill="#E23744" font-size="18">☕</text>
  <text x="385" y="659" fill="#fff" font-size="13" font-weight="700">Node 4</text>
  <text x="385" y="679" fill="#ccc" font-size="11">Geo-Temporal Beverage</text>
  <text x="535" y="679" fill="#4ade80" font-size="10" font-weight="600">60.6%</text>

  <!-- ═══ NODE 5 — Bottom Left ═══ -->
  <rect x="10" y="470" width="190" height="60" rx="12" fill="#1e1e30" stroke="#FF6B6B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="32" y="498" fill="#FF6B6B" font-size="18">🍰</text>
  <text x="58" y="494" fill="#fff" font-size="13" font-weight="700">Node 5</text>
  <text x="58" y="514" fill="#ccc" font-size="11">Regional Dessert</text>
  <text x="168" y="514" fill="#4ade80" font-size="10" font-weight="600">51.4%</text>

  <!-- ═══ NODE 6 — Top Left ═══ -->
  <rect x="10" y="215" width="190" height="60" rx="12" fill="#1e1e30" stroke="#FF6B6B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="32" y="243" fill="#FF6B6B" font-size="18">💰</text>
  <text x="58" y="239" fill="#fff" font-size="13" font-weight="700">Node 6</text>
  <text x="58" y="259" fill="#ccc" font-size="11">Budget Optimizer</text>
  <text x="168" y="259" fill="#4ade80" font-size="10" font-weight="600">26.6%</text>

  <!-- Example items around each node (small text) -->
  <text x="450" y="155" text-anchor="middle" fill="#777" font-size="10" font-style="italic">Pav Bhaji → Extra Pav</text>
  <text x="800" y="292" text-anchor="middle" fill="#777" font-size="10" font-style="italic">Soft → Crunchy contrast</text>
  <text x="800" y="547" text-anchor="middle" fill="#777" font-size="10" font-style="italic">Item-to-item co-purchase</text>
  <text x="450" y="710" text-anchor="middle" fill="#777" font-size="10" font-style="italic">Cuisine × Time × City Tier</text>
  <text x="105" y="547" text-anchor="middle" fill="#777" font-size="10" font-style="italic">Regional + User history</text>
  <text x="105" y="292" text-anchor="middle" fill="#777" font-size="10" font-style="italic">AOV whitespace fill</text>

  <!-- Output label at bottom -->
  <rect x="320" y="735" width="260" height="34" rx="10" fill="#E23744" opacity="0.9" filter="url(#shadow)"/>
  <text x="450" y="757" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">OUTPUT: 50–100 Candidates →  Stage 2</text>
</svg>
